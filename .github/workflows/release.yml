name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-cli:
    name: Build CLI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name: fscript-x86_64-unknown-linux-gnu.tar.gz
            use_cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive_name: fscript-aarch64-unknown-linux-gnu.tar.gz
            use_cross: true
          - os: macos-14
            target: aarch64-apple-darwin
            archive_name: fscript-aarch64-apple-darwin.tar.gz
            use_cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@cross

      - name: Build CLI
        env:
          FSCRIPT_RELEASE_TAG: ${{ github.event.release.tag_name }}
          FSCRIPT_BUILD_DATE: ${{ github.event.release.published_at }}
          FSCRIPT_BUILD_TARGET: ${{ matrix.target }}
          FSCRIPT_BUILD_PROFILE: release
          FSCRIPT_GIT_SHA: ${{ github.sha }}
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --locked --release --package fscript-cli --bin fscript --target "${{ matrix.target }}"
          else
            cargo build --locked --release --package fscript-cli --bin fscript --target "${{ matrix.target }}"
          fi

      - name: Package archive
        run: |
          mkdir -p dist
          tar -C "target/${{ matrix.target }}/release" -czf "dist/${{ matrix.archive_name }}" fscript

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ github.event.release.tag_name }}" "dist/${{ matrix.archive_name }}" --clobber
